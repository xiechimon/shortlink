<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 网页未找到</title>
    <!-- SEO tags -->
    <meta name="description" content="您访问的短链接不存在或已过期，请检查链接后重试">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --text-main: #ffffff;
            --text-muted: #888888;
            --text-dark: #666666;
            --border-light: rgba(255, 255, 255, 0.15);
            --transition-speed: 0.5s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #151515 0%, #030303 70%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
            padding: 2rem;
            animation: fadeUp 1.2s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            z-index: 2;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: clamp(7rem, 18vw, 12rem);
            font-weight: 200;
            line-height: 0.9;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            /* Create an elegant vertical fade effect on the text */
            background: linear-gradient(180deg, #ffffff 10%, rgba(255, 255, 255, 0.15) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
        }

        .title {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 3rem;
            margin-left: 0.6em; /* Optical alignment compensation */
        }

        .description {
            font-size: 0.95rem;
            line-height: 2;
            color: var(--text-dark);
            max-width: 450px;
            margin: 0 auto 4rem auto;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .btn-wrapper {
            display: flex;
            justify-content: center;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 48px;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-main);
            text-decoration: none;
            border: 1px solid var(--border-light);
            background: transparent;
            /* A subtle sophisticated outline */
            border-radius: 1px;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .btn-home:hover {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(255, 255, 255, 0.2);
        }

        .btn-home svg {
            width: 14px;
            height: 14px;
            margin-right: 12px;
            transition: transform var(--transition-speed) ease;
        }

        .btn-home:hover svg {
            transform: translateX(-4px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="error-code">404</h1>
        <h2 class="title">Not Found</h2>
        <p class="description">
            The link you accessed is invalid, has expired, or the content has been moved.<br>
            您访问的短链接已失效或不存在。
        </p>
        <div class="btn-wrapper">
            <!-- TODO
              注意：当前 project 模块（8001端口）只负责后端跳转逻辑，不存在根目录首页（/）。
              如果您有独立的前台网站（比如运行在 80 端口或其它域名的管理控制台），请将下面的 href 替换为您的实际官网地址。
              目前默认使用返回上一页的行为（或者当没有上一页记录时回退无效）。
            -->
            <a href="javascript:history.length > 1 ? history.back() : alert('当前就是起始页面，您可以直接关闭标签页或访问我们的官网。');" class="btn-home">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                RETURN HOME
            </a>
        </div>
    </div>
</body>
</html>
